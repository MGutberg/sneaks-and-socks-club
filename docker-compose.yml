version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_PATH=/app/data/database.sqlite
      - UPLOAD_DIR=/app/uploads
      - JWT_SECRET=sneaks-socks-super-secret-2024
    restart: unless-stopped
